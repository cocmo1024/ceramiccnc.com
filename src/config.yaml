site:
  name: CERAMIC CNC
  site: 'https://www.ceramiccnc.com'
  base: '/'
  trailingSlash: true

  googleSiteVerificationId: false

metadata:
  title:
    default: CERAMIC CNC | Custom Precision Ceramic CNC Machining
    template: '%s | CERAMIC CNC'
  description: 'Custom precision ceramic CNC machining, diamond grinding, lapping, micro-drilling, and RFQ review for Al2O3, ZrO2, Si3N4, SiC, MACOR, and technical ceramics.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: CERAMIC CNC
    images:
      - url: '~/assets/images/ceramic/hero-ceramic-cnc.webp'
        width: 1200
        height: 628
    type: website
  twitter:
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/posts/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'category/engineering-guide'
      robots:
        index: true

    category:
      isEnabled: false
      pathname: 'blog/category'
      robots:
        index: false

    tag:
      isEnabled: true
      pathname: 'blog/tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: false

ui:
  theme: 'dark'
